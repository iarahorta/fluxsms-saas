name: FluxSMS - Deploy de Segurança (Staging vs Produção)

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Define Environment Variables
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "backend_url=https://fluxsms-staging-production.up.railway.app" >> $GITHUB_OUTPUT
            echo "railway_service=fluxsms-staging" >> $GITHUB_OUTPUT
            echo "site_version=LAB-v11" >> $GITHUB_OUTPUT
          else
            echo "backend_url=https://fluxsms.com.br" >> $GITHUB_OUTPUT
            echo "railway_service=fluxsms-saas" >> $GITHUB_OUTPUT
            echo "site_version=PROD-v11" >> $GITHUB_OUTPUT
          fi

      - name: Inject Backend URL into JS
        env:
          SITE_VERSION: ${{ steps.env.outputs.site_version }}
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" _source_code_protected_/app.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" _source_code_protected_/app.js
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" _source_code_protected_/admin.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" _source_code_protected_/admin.js
          sed -i "s|__BACKEND_URL__|${{ steps.env.outputs.backend_url }}|g" _source_code_protected_/app.js
          sed -i "s|__BACKEND_URL__|${{ steps.env.outputs.backend_url }}|g" _source_code_protected_/admin.js
          # Injeta versão no HTML para controle de cache (qualquer ?v= anterior)
          node <<'NODE'
          const fs = require('fs');
          const v = process.env.SITE_VERSION;
          let html = fs.readFileSync('index.html', 'utf8');
          html = html.replace(/style\.css\?v=[^"'>\s]+/g, 'style.css?v=' + v);
          html = html.replace(/dist\/app\.shield\.js\?v=[^"'>\s]+/g, 'dist/app.shield.js?v=' + v);
          fs.writeFileSync('index.html', html);
          NODE

      - name: Install Dependencies
        env:
          NODE_ENV: development
        run: npm install --no-fund --no-audit

      - name: Build Protected Logic
        run: node obfuscate.js

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Sem project link, `railway up` falha em CI ("No linked project"). Crie o secret RAILWAY_PROJECT_ID (UUID do projeto no dashboard Railway).
      - name: Link Railway project (headless)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then echo "::error::Secret RAILWAY_TOKEN em falta"; exit 1; fi
          if [ -n "${RAILWAY_PROJECT_ID}" ]; then railway link -p "${RAILWAY_PROJECT_ID}"; else echo "::warning::RAILWAY_PROJECT_ID em falta — configure no GitHub (Settings → Secrets) ou faça deploy manual no Railway"; fi

      - name: Deploy to Railway (Dynamic Target)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          if [ ! -d .railway ] && [ -z "${RAILWAY_PROJECT_ID}" ]; then
            echo "::error::CI: falta RAILWAY_PROJECT_ID no GitHub (Settings → Secrets → Actions). Copie o Project ID no Railway (Project settings)."
            exit 1
          fi
          railway up --detach --service ${{ steps.env.outputs.railway_service }}
