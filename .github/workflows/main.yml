name: FluxSMS - Deploy Atômico V6

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-all:
    name: Build & Deploy (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject Production Env
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" _source_code_protected_/app.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" _source_code_protected_/app.js
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" _source_code_protected_/admin.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" _source_code_protected_/admin.js
          sed -i "s|__BACKEND_URL__|https://api.fluxsms.com.br|g" _source_code_protected_/app.js
          sed -i "s|__BACKEND_URL__|https://api.fluxsms.com.br|g" _source_code_protected_/admin.js

      - name: Install Dependencies
        run: npm install

      - name: Build Protected Logic (V6)
        run: node obfuscate.js

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (SINGLE SOURCE OF TRUTH)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service fluxsms-saas
