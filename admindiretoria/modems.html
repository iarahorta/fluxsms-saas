<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxSMS | Monitor de Modems</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Montserrat', sans-serif; }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 20px 36px; }
        .head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
        .head h1 { margin:0; color:#d4af37; font-size:1.4rem; }
        .tabs { display:flex; gap:8px; margin-bottom:12px; }
        .btn { background:transparent; border:1px solid #666; color:#bbb; padding:8px 14px; border-radius:8px; cursor:pointer; }
        .btn.active { border-color:#d4af37; color:#d4af37; }
        .card { background:#141414; border:1px solid #1f1f1f; border-radius:12px; padding:14px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:11px 10px; border-bottom:1px solid rgba(255,255,255,0.06); font-size:0.86rem; text-align:left; }
        th { color:rgba(255,255,255,0.6); font-size:0.75rem; text-transform:uppercase; letter-spacing:0.04em; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="head">
            <h1>Status dos Modems</h1>
            <a href="/admindiretoria/index.html" class="btn" style="text-decoration:none;">Voltar ao Admin</a>
        </div>
        <div class="tabs">
            <button id="tab-on" class="btn active" onclick="setTab('on')">Somente ON</button>
            <button id="tab-off" class="btn" onclick="setTab('off')">OFF / quarentena</button>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr><th>Porta</th><th>Número</th><th>Chave (registo)</th><th>Status</th><th>WhatsApp / disponível</th></tr>
                </thead>
                <tbody id="modems-tbody">
                    <tr><td colspan="5" style="text-align:center;opacity:0.65;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://ewwhywbwtqwtuujemtfk.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3d2h5d2J3dHF3dHV1amVtdGZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTAzMjYsImV4cCI6MjA5MTY2NjMyNn0.pgv9mkWHlq6wam7-BrN-zmlNDgyf-sDFTc1KT8IjvuU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        let currentTab = 'on';

        function isOnStatus(s) {
            const v = String(s || '').toLowerCase();
            return v === 'idle' || v === 'on' || v === 'online' || v === 'busy' || v === 'active' || v === 'quarentena';
        }
        function rowSeemsOn(c) {
            if (isOnStatus(c.status)) return true;
            const s = String(c.status || '').toLowerCase();
            if (s !== 'offline') return false;
            const lp = c.last_ping ? new Date(c.last_ping).getTime() : 0;
            return lp > 0 && (Date.now() - lp) < 5 * 60 * 1000;
        }
        function dedupe(rows) {
            const seen = new Set(); const out = [];
            for (const r of rows || []) {
                const k = `${r.porta || ''}|${r.numero || ''}|${String(r.status || '').toLowerCase()}`;
                if (seen.has(k)) continue;
                seen.add(k); out.push(r);
            }
            return out;
        }
        function setTab(tab) {
            currentTab = tab === 'off' ? 'off' : 'on';
            document.getElementById('tab-on').classList.toggle('active', currentTab === 'on');
            document.getElementById('tab-off').classList.toggle('active', currentTab === 'off');
            load();
        }
        async function load() {
            const tbody = document.getElementById('modems-tbody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;opacity:0.65;">Carregando...</td></tr>';
            const { data: { session } } = await db.auth.getSession();
            if (!session) { window.location.href = '/'; return; }
            const { data: profile } = await db.from('profiles').select('is_admin').eq('id', session.user.id).single();
            if (!profile || !profile.is_admin) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#f88;">Acesso restrito ao admin.</td></tr>'; return;
            }
            let data = null;
            let error = null;
            // Compatibilidade: alguns ambientes não possuem chips.updated_at.
            // Tenta updated_at e faz fallback para created_at / sem ordenação.
            let resp = await db.from('chips').select('*').order('updated_at', { ascending: false });
            data = resp.data;
            error = resp.error;
            if (error && String(error.message || '').toLowerCase().includes('updated_at')) {
                resp = await db.from('chips').select('*').order('created_at', { ascending: false });
                data = resp.data;
                error = resp.error;
            }
            if (error && String(error.message || '').toLowerCase().includes('created_at')) {
                resp = await db.from('chips').select('*');
                data = resp.data;
                error = resp.error;
            }
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#f88;">${error.message}</td></tr>`; return;
            }
            const rows = dedupe(data || []).filter((r) => (currentTab === 'on' ? rowSeemsOn(r) : !rowSeemsOn(r)));
            if (!rows.length) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;opacity:0.6;">Nenhum modem ${currentTab === 'on' ? 'ON' : 'OFF/quarentena'}.</td></tr>`; return;
            }
            tbody.innerHTML = rows.map((c) => {
                const st = String(c.status || '').toUpperCase();
                const wa = c.disponivel_em ? new Date(c.disponivel_em).toLocaleString('pt-BR') : '—';
                const reg = c.registered_by_api_key_id ? String(c.registered_by_api_key_id).slice(0, 8) + '…' : '— (legado)';
                return `<tr><td>Porta ${c.porta || '—'}</td><td>${c.numero || 'Vazio'}</td><td style="font-family:monospace;font-size:0.8rem;">${reg}</td><td>${st}</td><td>${wa}</td></tr>`;
            }).join('');
        }
        setInterval(load, 15000);
        load();
    </script>
</body>
</html>
